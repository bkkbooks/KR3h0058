  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0058_WYG_001-1a}
body:
  text: 清河書畫表明張丑撰吾家世有聞人自張老張仲顯名于周室漢之西京留矦最著東京道陵次之如耳如蒼如騫如安世各有功業載在史䇿猗歟盛哉嗣自以降由魏迄元俊傑挺生英賢掘起中間騷人墨客方術閨秀之流先後層見疊出筆舌未能殫述今姑置之勿論論其小者語云書畫一小道于伎未為尊古來工八法者則有若伯英茂先伯髙文昌清叔伯雨衍其流擅六要者則有若平子僧繇孝師南本文通志和擇端敦禮振其緒稱鑒賞者則有若懷瓘愛賓直清敬夫仲悅斯立博其趣人握靈蛇之珠家傳威鳳之羽可謂榮逾華衮何假南面百城耶斯人也斯藝也或稱天上文星而散處乎六合或號翰林武庫而輝映乎千秋世代綿逺能無興廢尚賴記載之書連篇纍牘存未墜于一線享敝帚以千金厥義微矣厥功懋焉六合千秋無事多贅今且撰述私門鋪張纍代六世以上存而不論如小子丑蓋其慎也相傳始祖真關處士誕生勝國韜晦全身修道入山旁求名迹所蓄黃魯直手書陰長生詩三章劉松年老子出關圖二卷浮沉散逸無從稽考其後先髙祖元素府君自海上徙居安里投分二沈度粲之門民則為書相鶴經以贈焉斯其人品概可見矣曾伯祖維慶曾祖子和盍簪抑之延美二彥士先世春草堂圖實出白石翁手而浦應祥文宗儒詩之吾家文獻此其斑斑足徵者乎繼而我祖約之叔祖誠之並承庭訓互相師友後先成進士登甲科與徵仲先生為莫逆交其長公壽承次公休承向先子茂實稱通家姻婭朝夕過從無間寒暑尋源遡流訂今考古一時家藏珍圖法墨甲于中吳雖上古素封之滎蔑以加此維時人望所屬不讓海嶽雲林云隆慶丁卯伯兄以繩氏髫年登南國賢書丰姿美如冠玉先世之藏畢聚其室兄又陸續收購逺近嚮應三篋五車漸成册府不幸遭仇燒劫蕩析無復孑遺平泉草木之感能不興懷永歎走也志敦宿好多方拾遺拮據收録名品略具政如窮波斯聚寶船辛苦頭白幸會猶子誕嘉稚齡賞識天縱慧心人間不資墨寶悉歸祕槖可稱書畫中興差堪鼓腹于時風雅之士載酒問竒者絡繹不絶未及十年滄桑改變乃誕嘉坐家事旁落而薄劣以婚嫁逼人日削月刪傾筐倒篋希遇餅金懸購竟成無是公矣嗚呼惜哉若不表示四方後世誰知我者聊藉管城子印正墨胎氏修家乘陽秋之任請俟來哲清河書畫表
