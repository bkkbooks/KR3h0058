body:
  text: 提要清河書畫表藝術類一書畫之屬臣等謹案清河書畫表一卷明張丑記其家纍世所藏書畫也丑自叙稱其始祖號真關處士者即收藏書畫有黃庭堅劉松年諸跡已散佚無存是表所列以書畫時代為經以世系為緯第一格為其髙祖元素所藏第二格為其曽伯祖維慶曽祖子和所藏第三格為其祖約之叔祖誠之所藏第四格為其父茂實所藏第五格為其兄以繩所藏第六格為丑所自藏第七格為其姪誕嘉所藏上迄晉下迄明計作者八十一人四十九帖一百一十五圖中多名跡蓋自其髙祖即出沈度沈粲之門其曽祖亦與沈周游其祖父皆與文徴明父子為姻婭世好淵源有自故丑特以賞鑒聞然據其自序則作表之時家事中落已斥賣盡矣此特追録其名耳書畫見聞表藝術類一書畫之屬臣等謹案書畫見聞表一卷明張丑撰蓋仿米芾寶章待訪録例變而為表凡分四格第一格為時代第二格為目覩第三格為的聞第四格則每一朝代總計其數題曰會計凡一百五十五人一百八十八帖三百五十六圖末附顧愷之夏禹治水圖王羲之行穰帖皆注曰見虞世南臨張芝平復帖顏真卿鹿脯帖皆注曰聞蓋表成以後所續載也丑别有南陽書畫表故表首附記已見彼者不録又云凡影響附會者不書然所列目覩諸名與所作書畫舫真跡目録多不相應意此數表成于二書之前耶乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:54cc6f82cc1b1c1aa3ea07112a1a020e906e37399a2e25946ab6257edad01e0b
